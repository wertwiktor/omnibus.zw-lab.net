# nginx vhost for ZW-Omnibus on CT230
# - / serves the SPA
# - /recorder/api/* proxies to the recorder backend (JWT-checked there)
# - /recorder/novnc/<port>/* proxies to per-session noVNC (websocket)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    server_name omnibus.zw-lab.net;
    root /var/www/omnibus;
    index index.html;

    client_max_body_size 2g;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /recorder/api/ {
        proxy_pass http://127.0.0.1:8088/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }

    # noVNC per-slot: /recorder/novnc/6080/... -> 127.0.0.1:6080/...
    location ~ "^/recorder/novnc/(60[0-9]{2})/(.*)$" {
        proxy_pass http://127.0.0.1:$1/$2$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}
